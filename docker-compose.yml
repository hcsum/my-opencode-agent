services:
  agent:
    build: .
    container_name: opencode-agent
    command: npm run serve-and-bridge
    env_file: .env
    environment:
      - OPENCODE_SERVE_PORT=4096
      - OPENCODE_BASE_URL=http://127.0.0.1:4096
    volumes:
      # Mount workspace so server and bridge see notes/, skills/, etc.
      - .:/workspace
      # Preserve container's node_modules and dist from image build
      - node_modules:/workspace/node_modules
      - dist:/workspace/dist
      # Gmail OAuth credentials from host
      - ~/.gmail-mcp:/root/.gmail-mcp:ro
      # Reuse host OpenCode login/config so `opencode serve` can access the connected account
      - ~/.local/share/opencode/auth.json:/root/.local/share/opencode/auth.json:ro
      - ~/.config/opencode/opencode.json:/root/.config/opencode/opencode.json:ro
    ports:
      - "4096:4096"
    working_dir: /workspace
    restart: unless-stopped

volumes:
  node_modules:
  dist:
