services:
  agent:
    build: .
    container_name: opencode-agent
    # Run the supervisor as PID 1 (not via `npm run`) so Docker's SIGTERM
    # reaches it directly and the graceful-shutdown trap fires.
    command: ["bash", "scripts/serve-and-bridge.sh"]
    # Give the in-flight task time to finish and deliver before SIGKILL. Must
    # exceed SHUTDOWN_DRAIN_TIMEOUT_MS below, with headroom for the model
    # server to stop afterward.
    stop_grace_period: 300s
    env_file: .env
    environment:
      - OPENCODE_SERVE_PORT=4096
      - OPENCODE_BASE_URL=http://127.0.0.1:4096
      - BRIDGE_DISABLE_LOCK=true
      - BROWSERBASE_REGION=ap-southeast-1
      - GMAIL_NEWER_THAN=10m
      # Upper bound on draining in-flight work on shutdown; keep < stop_grace_period.
      - SHUTDOWN_DRAIN_TIMEOUT_MS=270000
      # Optional: override the model set in .opencode/opencode.json per-deployment
      - OPENCODE_MODEL=openai/gpt-5.4
      - DEPLOY_COMMIT_SHA=${DEPLOY_COMMIT_SHA:-}
      - DEPLOY_COMMIT_MESSAGE=${DEPLOY_COMMIT_MESSAGE:-}
      - DEPLOY_RUN_ID=${DEPLOY_RUN_ID:-}
      - DEPLOY_ACTOR=${DEPLOY_ACTOR:-}
      - DEPLOYED_AT=${DEPLOYED_AT:-}
    volumes:
      # Persist only runtime data; app code and dependencies come from the image.
      - ./.data:/workspace/.data
      # Keep notes as a live host repo instead of baking them into the image.
      - ./notes:/workspace/notes
      # Host-side credential/state dirs. These are project-relative by default
      # so they resolve to the SAME path no matter which user runs
      # `docker compose` (root vs deploy). Do NOT use `~`-relative paths here:
      # `~` expands to the running user's home, so running as root once mounts
      # an empty /root/... and silently breaks Gmail/auth. Override via .env
      # only when you must point at an existing location on a legacy box.
      - ${GMAIL_MCP_DIR:-./.secrets/gmail-mcp}:/root/.gmail-mcp
      - ${OPENCODE_SHARE_DIR:-./.secrets/opencode-share}:/root/.local/share/opencode
      - ${OPENCODE_CONFIG_DIR:-./.secrets/opencode-config}:/root/.config/opencode
    ports:
      - "4096:4096"
    working_dir: /workspace
    restart: unless-stopped
