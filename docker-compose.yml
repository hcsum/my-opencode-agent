services:
  agent:
    build: .
    container_name: opencode-agent
    command: npm run serve-and-bridge
    env_file: .env
    environment:
      - OPENCODE_SERVE_PORT=4096
      - OPENCODE_BASE_URL=http://127.0.0.1:4096
      - BRIDGE_DISABLE_LOCK=true
      - BROWSERBASE_REGION=ap-southeast-1
      - GMAIL_NEWER_THAN=10m
      # Optional: override the model set in .opencode/opencode.json per-deployment
      # - OPENCODE_MODEL=openai/gpt-5.4
    volumes:
      # Persist only runtime data; app code and dependencies come from the image.
      - ./.data:/workspace/.data
      # Gmail OAuth credentials from host
      - ~/.gmail-mcp:/root/.gmail-mcp
      # Reuse full host OpenCode state so server sees auth, logs, DB, and session history
      - ~/.local/share/opencode:/root/.local/share/opencode
      - ~/.config/opencode:/root/.config/opencode
    ports:
      - "4096:4096"
    working_dir: /workspace
    restart: unless-stopped
